services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: studyclaw-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-3001}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    ports:
      - "${API_BIND_IP:-127.0.0.1}:${API_PORT:-38101}:3001"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: studyclaw
      POSTGRES_USER: studyclaw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyclaw -d studyclaw"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - studyclaw_postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_BIND_IP:-127.0.0.1}:${POSTGRES_PORT:-55432}:5432"

  redis:
    image: redis:7-alpine
    profiles: ["infra"]
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - studyclaw_redis_data:/data
    ports:
      - "${REDIS_BIND_IP:-127.0.0.1}:${REDIS_PORT:-56379}:6379"

volumes:
  studyclaw_postgres_data:
  studyclaw_redis_data:
